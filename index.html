<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">
<title>Tech Expo Hub Pro</title>
<style>
body{background:#0f172a;color:white;font-family:Arial;margin:0}
header{padding:15px;text-align:center;background:#1e293b}
.card{background:#1e293b;margin:10px;padding:10px;border-radius:10px}
button{margin-top:5px;padding:6px;border:none;border-radius:6px}
</style>
</head>
<body>

<header>
<h2>🌏 Tech Expo Hub Pro</h2>
<input id="search" placeholder="Search events..." style="padding:6px;width:80%">
</header>

<div id="events"></div>

<script>
let events=[];

async function load(){
 let res=await fetch('events.json');
 events=await res.json();
 render();
}

function render(){
 let s=document.getElementById('search').value.toLowerCase();
 let html='';
 events.filter(e=>!e.finished && e.name.toLowerCase().includes(s))
 .forEach(e=>{
  html+=`
  <div class="card">
   <b>${e.name}</b><br>
   ${e.city||e.place}<br>
   ${e.start} - ${e.end}<br>
   <button onclick='cal(${JSON.stringify(e)})'>📅 Calendar</button>
   <a href="${e.url}" target="_blank"><button>🌐 Link</button></a>
   <button onclick="map('${e.city||e.place}')">🧭 Map</button>
  </div>`;
 });
 document.getElementById('events').innerHTML=html;
}

function cal(e){
 let d=x=>x.replace(/-/g,'')+"T090000";
 let ics=`BEGIN:VCALENDAR
VERSION:2.0
BEGIN:VEVENT
SUMMARY:${e.name}
DTSTART:${d(e.start)}
DTEND:${d(e.end)}
LOCATION:${e.city||e.place}
END:VEVENT
END:VCALENDAR`;
 let blob=new Blob([ics],{type:'text/calendar'});
 let a=document.createElement('a');
 a.href=URL.createObjectURL(blob);
 a.download=e.name+".ics";
 a.click();
}

function map(loc){
 window.open("https://www.google.com/maps/search/"+loc);
}

document.getElementById('search').addEventListener('input',render);

if('serviceWorker'in navigator){navigator.serviceWorker.register('sw.js')}

load();
</script>

</body>
</html>
